{% extends 'base.html' %}
{% load static%}
{% block content %}
<title>{% block title %}Delete | Comment{% endblock %}</title>
<h1 class="color">Delete Comment Page</h1>
<p>
    <a class="color-return "href="{% url 'index' %}">Return Home</a>
</p>
<div class="card-detail-wrapper">
    <div class="container">
        <h1 class="color">Delete Comment</h1>
        <p>Are you sure you want to delete this comment:</p>
        <p><strong>"{{ comment.text }}"</strong></p>
        <form method="post" action="{% url 'delete-comment' pk=comment.pk %}">
            {% csrf_token %}
            <button type="submit">Confirm delete</button>
            <a href="{% url 'destinations-details' pk=comment.places.card.pk %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
